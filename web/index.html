<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sticky Prompter — web teleprompter</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141821;
    --panel-2: #1c212c;
    --line: #2a303c;
    --text: #eef2f8;
    --dim: #8a93a3;
    --accent: #7fb5ff;
    --accent-fg: #06101f;
    --read: #59657a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- top bar ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; letter-spacing: .2px; }
  .brand svg { width: 22px; height: 22px; }
  .spacer { flex: 1 1 auto; }

  .group { display: flex; align-items: center; gap: 4px; background: var(--panel-2); border-radius: 10px; padding: 3px; }
  .group .lbl { font-size: 11px; color: var(--dim); padding: 0 8px 0 6px; text-transform: uppercase; letter-spacing: .5px; }

  button, .seg {
    font: inherit;
    color: var(--text);
    background: transparent;
    border: none;
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  button:hover, .seg:hover { background: rgba(255,255,255,.06); }
  button svg, .seg svg { width: 16px; height: 16px; }
  .seg.on { background: var(--accent); color: var(--accent-fg); }
  .seg.on:hover { background: var(--accent); }

  .primary {
    background: var(--accent);
    color: var(--accent-fg);
    font-weight: 700;
    padding: 9px 18px;
  }
  .primary:hover { background: #9cc6ff; }
  .primary:disabled { opacity: .4; cursor: default; background: var(--accent); }

  .slider { display: flex; align-items: center; gap: 8px; }
  input[type=range] { accent-color: var(--accent); width: 120px; }
  .wpm { font-variant-numeric: tabular-nums; color: var(--dim); font-size: 12px; min-width: 58px; }

  /* ---------- main split ---------- */
  main { flex: 1 1 auto; display: flex; min-height: 0; }

  /* editor pane */
  .editor { width: 340px; border-right: 1px solid var(--line); display: flex; flex-direction: column; background: var(--panel); }
  .editor h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); margin: 0; padding: 12px 14px 8px; }
  .editor textarea {
    flex: 1 1 auto;
    resize: none;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font: 15px/1.6 inherit;
    padding: 0 14px 14px;
  }
  .editor textarea::placeholder { color: var(--dim); }
  .editor.collapsed { width: 0; border-right: none; overflow: hidden; }

  /* prompter pane */
  .stage { flex: 1 1 auto; position: relative; overflow: hidden; background: #000; }
  .prompter {
    position: absolute; inset: 0;
    overflow-y: auto;
    padding: 18vh 8% 40vh;
    scroll-behavior: smooth;
    transition: transform .15s ease;
  }
  .prompter::-webkit-scrollbar { width: 0; }
  .line { font-size: var(--fs, 44px); font-weight: 600; line-height: 1.35; margin: 0 0 .1em; }
  .line.gap { margin-bottom: .8em; }
  .w { color: var(--text); transition: color .1s; cursor: pointer; }
  .w.read { color: var(--read); }
  .w.cur { color: var(--accent-fg); background: var(--accent); border-radius: 4px; padding: 0 2px; }
  /* line mode: whole current line lit, past lines stay bright */
  .prompter.linemode .w.read { color: var(--text); }
  .prompter.linemode .line.curline .w { color: var(--accent-fg); background: var(--accent); border-radius: 4px; }

  /* center guide line near the top third */
  .stage::after {
    content: "";
    position: absolute; left: 0; right: 0; top: 33%;
    border-top: 2px solid rgba(127,181,255,.28);
    pointer-events: none;
  }

  /* progress */
  .prog { position: absolute; left: 0; bottom: 0; height: 3px; background: var(--accent); width: 0; transition: width .2s; }

  .empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--dim); gap: 10px; text-align: center; pointer-events: none;
    font-size: 16px;
  }
  .empty svg { width: 42px; height: 42px; opacity: .5; }

  .heard { position: absolute; left: 16px; bottom: 14px; color: var(--dim); font-size: 13px; max-width: 70%; }
  .warn { position: absolute; right: 16px; bottom: 14px; color: #ffb454; font-size: 12px; max-width: 46%; text-align: right; }

  footer { padding: 6px 16px; background: var(--panel); border-top: 1px solid var(--line); color: var(--dim); font-size: 12px; text-align: center; }
  kbd { background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; font-size: 11px; }

  @media (max-width: 720px) {
    .editor { width: 240px; }
    input[type=range] { width: 80px; }
    .group .lbl { display: none; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="2" width="18" height="20" rx="4" fill="#141821" stroke="#2a303c"/><rect x="10" y="6" width="4" height="8" rx="2" fill="#7fb5ff"/><path d="M8 12a4 4 0 0 0 8 0M12 16v3M9.5 19h5" stroke="#7fb5ff" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
      Sticky Prompter
    </div>

    <div class="group" role="group" aria-label="Mode">
      <span class="lbl">Mode</span>
      <button class="seg on" id="modeSteady">Steady</button>
      <button class="seg" id="modeVoice">Voice</button>
    </div>

    <div class="group slider" id="speedGroup">
      <span class="lbl">Speed</span>
      <input type="range" id="wpm" min="60" max="260" step="5" value="140" aria-label="Words per minute">
      <span class="wpm"><span id="wpmVal">140</span> wpm</span>
    </div>

    <div class="group" role="group" aria-label="Flip">
      <span class="lbl">Flip</span>
      <button class="seg" id="flipH" title="Mirror left–right (for teleprompter glass)">⇋</button>
      <button class="seg" id="flipV" title="Flip upside-down">⥯</button>
    </div>

    <button id="toggleEditor" title="Show / hide the text panel">✎ Text</button>

    <div class="spacer"></div>

    <div class="group slider">
      <span class="lbl">Size</span>
      <input type="range" id="fontSize" min="24" max="96" step="2" value="44" aria-label="Font size">
    </div>

    <button class="primary" id="goBtn">▶ Start</button>
  </header>

  <main>
    <section class="editor" id="editor">
      <h2>Your script — paste it here</h2>
      <textarea id="scriptInput" placeholder="Paste or type your script here.

Then hit Start. In Steady mode it scrolls at your chosen speed; in Voice mode it follows along as you read aloud. Click any word to jump there."></textarea>
    </section>

    <section class="stage">
      <div class="prompter" id="prompter"></div>
      <div class="empty" id="empty">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 10h16M4 14h10M4 18h13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <div>Paste your script on the left, then press Start</div>
      </div>
      <div class="heard" id="heardLine"></div>
      <div class="warn" id="speechWarn" style="display:none">Voice mode needs Chrome or Edge. Steady mode works everywhere.</div>
      <div class="prog" id="progBar"></div>
    </section>
  </main>

  <footer>
    <kbd>Space</kbd> start / pause · <kbd>Esc</kbd> stop · <kbd>↑</kbd><kbd>↓</kbd> nudge · click a word to jump · everything stays in your browser
  </footer>

<script>
(function () {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const LS_KEY = "stickyPrompterWeb";
  const LOOKAHEAD = 12;

  const App = {
    tokens: [], rows: [], pos: 0, prevPainted: 0,
    anchor: 0, pending: [], discardUtterance: false,
    mode: "steady",          // "steady" | "voice"
    running: false,
    wantListening: false, listening: false,
    autoTimer: null,
    settings: { script: "", wpm: 140, fontSize: 44, flipH: false, flipV: false, mode: "steady", lang: "en-US" },
  };

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) $('speechWarn').style.display = 'block';

  // ---------- persistence ----------
  function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(App.settings)); } catch (e) {} }
  function load() {
    try { const s = JSON.parse(localStorage.getItem(LS_KEY)); if (s) Object.assign(App.settings, s); } catch (e) {}
  }

  // ---------- text utils (same matcher as the macOS app) ----------
  function normalize(w) { return w.toLowerCase().replace(/[^\p{L}\p{N}']/gu, ''); }
  function near(a, b) {
    if (a === b) return true;
    const la = a.length, lb = b.length;
    if (la < 4 || lb < 4) return false;
    if (Math.abs(la - lb) > 1) return false;
    if (a.startsWith(b) || b.startsWith(a)) return true;
    let i = 0, j = 0, edits = 0;
    while (i < la && j < lb) {
      if (a[i] === b[j]) { i++; j++; continue; }
      if (++edits > 1) return false;
      if (la > lb) i++; else if (lb > la) j++; else { i++; j++; }
    }
    return edits + (la - i) + (lb - j) <= 1;
  }

  // ---------- render script ----------
  function buildScript(text) {
    App.settings.script = text;
    App.tokens = []; App.rows = [];
    App.pos = 0; App.prevPainted = 0; App.anchor = 0; App.pending = [];
    const body = $('prompter');
    body.innerHTML = '';
    const lines = text.split('\n');
    let idx = 0;
    lines.forEach((line, li) => {
      const words = line.trim().split(/\s+/).filter(Boolean);
      if (!words.length) return;
      const div = document.createElement('div');
      div.className = 'line';
      if (li + 1 < lines.length && lines[li + 1].trim() === '') div.classList.add('gap');
      const rowStart = idx;
      words.forEach(w => {
        const norm = normalize(w);
        const span = document.createElement('span');
        span.className = 'w';
        span.textContent = w;
        const myIdx = idx;
        span.addEventListener('click', () => jumpTo(myIdx));
        div.appendChild(span);
        div.appendChild(document.createTextNode(' '));
        if (norm) { App.tokens.push({ norm, el: span, row: App.rows.length }); idx++; }
        else { span.style.opacity = .5; }
      });
      if (idx > rowStart) App.rows.push({ start: rowStart, end: idx, el: div });
      body.appendChild(div);
    });
    $('empty').style.display = App.tokens.length ? 'none' : 'flex';
    $('goBtn').disabled = !App.tokens.length;
    paint();
    body.scrollTop = 0;
    save();
  }

  // ---------- highlight ----------
  function paint() {
    const { tokens, pos } = App;
    const lineMode = App.mode === 'steady';
    $('prompter').classList.toggle('linemode', lineMode);
    if (lineMode) {
      const curRow = tokens[Math.min(pos, tokens.length - 1)] ? tokens[Math.min(pos, tokens.length - 1)].row : -1;
      App.rows.forEach((r, ri) => r.el.classList.toggle('curline', ri === curRow));
    } else {
      const lo = Math.min(App.prevPainted, pos), hi = Math.max(App.prevPainted, pos);
      for (let i = Math.max(0, lo - 1); i <= Math.min(tokens.length - 1, hi + 1); i++) {
        tokens[i].el.classList.toggle('read', i < pos);
        tokens[i].el.classList.toggle('cur', i === pos);
      }
    }
    App.prevPainted = pos;
    $('progBar').style.width = tokens.length ? (pos / tokens.length * 100) + '%' : '0%';
    scrollToCurrent();
  }

  function scrollToCurrent() {
    const t = App.tokens[Math.min(App.pos, App.tokens.length - 1)];
    if (!t) return;
    const body = $('prompter');
    const r = t.el.getBoundingClientRect();
    const c = body.getBoundingClientRect();
    // account for vertical flip: "top third" is measured in flipped space
    const frac = App.settings.flipV ? 0.67 : 0.33;
    const target = body.scrollTop + (r.top - c.top) - c.height * frac;
    if (Math.abs(target - body.scrollTop) > 6) body.scrollTop = target;
  }

  function jumpTo(i) {
    App.pos = Math.max(0, Math.min(i, App.tokens.length));
    App.anchor = App.pos;
    App.pending = [];
    if (App.wantListening) App.discardUtterance = true;
    paint();
  }

  // ---------- voice matching ----------
  function consumeWord(raw) {
    const w = normalize(raw);
    if (!w) return;
    const { tokens } = App;
    if (App.pos < tokens.length && near(w, tokens[App.pos].norm)) { App.pos++; App.pending = []; return; }
    if (!App.pending.length && App.pos + 1 < tokens.length && w.length >= 4 && near(w, tokens[App.pos + 1].norm)) { App.pos += 2; return; }
    App.pending.push(w);
    if (App.pending.length > 4) App.pending.shift();
    if (App.pending.length >= 2) {
      const a = App.pending[App.pending.length - 2], b = App.pending[App.pending.length - 1];
      const end = Math.min(App.pos + LOOKAHEAD, tokens.length - 1);
      for (let j = App.pos; j < end; j++) {
        if (near(a, tokens[j].norm) && near(b, tokens[j + 1].norm)) { App.pos = j + 2; App.pending = []; return; }
      }
    }
  }
  App.consumeWord = consumeWord;

  function handleTranscript(words, isFinal) {
    if (App.discardUtterance) { if (isFinal) { App.discardUtterance = false; App.anchor = App.pos; } return; }
    App.pos = App.anchor;
    App.pending = [];
    words.forEach(consumeWord);
    if (isFinal) App.anchor = App.pos;
    paint();
    $('heardLine').textContent = App.listening ? '“…' + words.slice(-7).join(' ') + '”' : '';
    if (App.pos >= App.tokens.length && App.tokens.length) $('heardLine').textContent = '🎉 End of script';
  }
  App.handleTranscript = handleTranscript;

  let rec = null;
  function initRecognition() {
    if (!SR) return null;
    const r = new SR();
    r.continuous = true; r.interimResults = true; r.lang = App.settings.lang;
    r.onresult = (ev) => {
      const res = ev.results[ev.results.length - 1];
      const w = res[0].transcript.trim().split(/\s+/).filter(Boolean);
      handleTranscript(w, res.isFinal);
    };
    r.onend = () => { App.listening = false; if (App.wantListening) { try { r.start(); App.listening = true; } catch (e) {} } };
    r.onerror = () => { App.listening = false; };
    return r;
  }

  function startVoice() {
    if (!SR) { $('speechWarn').style.display = 'block'; return; }
    if (!rec) rec = initRecognition();
    App.wantListening = true;
    try { rec.start(); App.listening = true; } catch (e) {}
    $('heardLine').textContent = 'Listening…';
  }
  function stopVoice() {
    App.wantListening = false; App.listening = false;
    if (rec) try { rec.stop(); } catch (e) {}
    $('heardLine').textContent = '';
  }

  // ---------- steady auto-scroll (line by line) ----------
  function currentRow() {
    const t = App.tokens[Math.min(App.pos, App.tokens.length - 1)];
    return t ? App.rows[t.row] : null;
  }
  function scheduleAuto() {
    clearTimeout(App.autoTimer);
    if (!App.running || App.mode !== 'steady') return;
    const r = currentRow();
    const words = r ? Math.max(1, r.end - r.start) : 1;
    const ms = words * 60000 / Math.max(40, App.settings.wpm);
    App.autoTimer = setTimeout(autoTick, ms);
  }
  function autoTick() {
    if (!App.running || App.mode !== 'steady') return;
    const r = currentRow();
    if (r && r.end < App.tokens.length) { App.pos = r.end; App.anchor = App.pos; paint(); scheduleAuto(); }
    else { App.pos = App.tokens.length; paint(); stopRun(); $('heardLine').textContent = '🎉 End of script'; }
  }

  // ---------- run control ----------
  function startRun() {
    if (!App.tokens.length) return;
    if (App.pos >= App.tokens.length) jumpTo(0); // replay
    App.running = true;
    setGo();
    if (App.mode === 'voice') startVoice(); else scheduleAuto();
  }
  function pauseRun() {
    App.running = false;
    clearTimeout(App.autoTimer);
    if (App.mode === 'voice') stopVoice();
    setGo();
  }
  function stopRun() {
    App.running = false;
    clearTimeout(App.autoTimer);
    stopVoice();
    setGo();
  }
  function toggleRun() { App.running ? pauseRun() : startRun(); }

  function setGo() {
    const b = $('goBtn');
    b.textContent = App.running ? '❚❚ Pause' : (App.pos > 0 && App.pos < App.tokens.length ? '▶ Resume' : '▶ Start');
  }

  // ---------- flips & sizing ----------
  function applyTransform() {
    const sx = App.settings.flipH ? -1 : 1, sy = App.settings.flipV ? -1 : 1;
    $('prompter').style.transform = `scale(${sx}, ${sy})`;
    $('flipH').classList.toggle('on', App.settings.flipH);
    $('flipV').classList.toggle('on', App.settings.flipV);
  }
  function applyFont() {
    document.documentElement.style.setProperty('--fs', App.settings.fontSize + 'px');
    $('fontSize').value = App.settings.fontSize;
  }
  function applyMode() {
    const voice = App.mode === 'voice';
    $('modeVoice').classList.toggle('on', voice);
    $('modeSteady').classList.toggle('on', !voice);
    $('speedGroup').style.display = voice ? 'none' : '';
    App.settings.mode = App.mode;
    paint();
  }
  function setMode(m) {
    if (App.mode === m) return;
    if (App.running) stopRun();
    App.mode = m;
    applyMode();
    save();
  }

  // ---------- wire up ----------
  $('scriptInput').addEventListener('input', (e) => buildScript(e.target.value));
  $('goBtn').addEventListener('click', toggleRun);
  $('modeSteady').addEventListener('click', () => setMode('steady'));
  $('modeVoice').addEventListener('click', () => setMode('voice'));
  $('flipH').addEventListener('click', () => { App.settings.flipH = !App.settings.flipH; applyTransform(); save(); });
  $('flipV').addEventListener('click', () => { App.settings.flipV = !App.settings.flipV; applyTransform(); save(); });
  $('toggleEditor').addEventListener('click', () => $('editor').classList.toggle('collapsed'));
  $('wpm').addEventListener('input', (e) => {
    App.settings.wpm = +e.target.value; $('wpmVal').textContent = e.target.value;
    save(); if (App.running) scheduleAuto();
  });
  $('fontSize').addEventListener('input', (e) => { App.settings.fontSize = +e.target.value; applyFont(); save(); });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA') return;      // don't hijack typing
    if (e.code === 'Space') { e.preventDefault(); toggleRun(); }
    else if (e.code === 'Escape') { stopRun(); jumpTo(0); }
    else if (e.code === 'ArrowUp') { e.preventDefault(); jumpTo(App.pos - 8); }
    else if (e.code === 'ArrowDown') { e.preventDefault(); jumpTo(App.pos + 8); }
    else if (e.code === 'ArrowLeft') { jumpTo(App.pos - 1); }
    else if (e.code === 'ArrowRight') { jumpTo(App.pos + 1); }
  });

  // ---------- init ----------
  load();
  App.mode = App.settings.mode === 'voice' && SR ? 'voice' : 'steady';
  $('scriptInput').value = App.settings.script || '';
  $('wpm').value = App.settings.wpm; $('wpmVal').textContent = App.settings.wpm;
  applyFont(); applyTransform(); applyMode();
  buildScript(App.settings.script || '');
  setGo();

  // ---------- self test (append ?selftest to the URL) ----------
  if (location.search.indexOf('selftest') >= 0) {
    const out = [];
    let fails = 0;
    function expect(name, got, want) { const ok = got === want; if (!ok) fails++; out.push((ok ? 'PASS ' : 'FAIL ') + name + ' pos=' + got + ' want=' + want); }
    buildScript("Hey everyone, welcome back to the channel!\n\nToday I want to show you something.");
    App.pos = App.anchor = 0;
    handleTranscript(["hey"], false); expect("one word", App.pos, 1);
    handleTranscript(["hey", "everyone", "welcome"], false); expect("interim", App.pos, 3);
    handleTranscript(["hey", "everyone", "welcome", "back", "to", "the", "channel"], true); expect("sentence", App.pos, 7);
    handleTranscript(["toady", "i", "want"], true); expect("garbled resync", App.pos, 10);
    document.body.innerHTML = "<pre style='color:#eef2f8;background:#0b0d12;padding:20px;font:14px monospace'>" +
      out.join("\n") + "\n\n" + (fails ? fails + " FAILURES" : "ALL PASS") + "</pre>";
  }
})();
</script>
</body>
</html>
